# test.yml

name: Test Action

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Test
        run: echo 'Test successful'

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: test-results.txt
